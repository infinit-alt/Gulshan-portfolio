  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const audio = document.getElementById('background-music');
      const btn = document.getElementById('music-enable-btn');
      if (!audio) return;

      const findToggleButton = () => document.getElementById('audio-toggle-btn');
      const updateToggleButton = () => {
        const toggleBtn = findToggleButton();
        if (!toggleBtn) return;
        const playing = !audio.paused && !audio.ended;
        toggleBtn.classList.toggle('active', playing);
        toggleBtn.innerHTML = `<i class="fas ${playing ? 'fa-volume-high' : 'fa-volume-xmark'}"></i>`;
        toggleBtn.title = playing ? 'Pause music' : 'Play music';
      };

      document.addEventListener('click', function (event) {
        const target = event.target instanceof Element ? event.target.closest('#audio-toggle-btn') : null;
        if (!target) return;
        if (audio.paused) {
          audio.play().then(updateToggleButton).catch(() => {
            console.warn('Playback blocked; user interaction required.');
          });
        } else {
          audio.pause();
          updateToggleButton();
        }
      });

      audio.addEventListener('play', updateToggleButton);
      audio.addEventListener('pause', updateToggleButton);
      audio.addEventListener('ended', updateToggleButton);

      audio.volume = 0.45;
      audio.play().then(updateToggleButton).catch(() => {
        console.warn('Autoplay blocked; music will start on first user interaction.');
        if (btn) {
          btn.style.display = 'block';
          btn.addEventListener('click', () => {
            audio.play().then(() => {
              btn.style.display = 'none';
              updateToggleButton();
            }).catch(() => {
              console.warn('Music still blocked after user interaction.');
            });
          });
        }
      }).finally(() => {
        updateToggleButton();
      });
    });
  </script>

      const [text, setText] = useState('');

      const [isDeleting, setIsDeleting] = useState(false);

      const currentWord = words[wordIndex] || words[0];
      const currentColor = currentWord.color || '#ffffff';

      useEffect(() => {
        const word = currentWord.text;
        let typingDelay = isDeleting ? 40 : 120;

        if (!isDeleting && text === word) {
          typingDelay = 2000;
          const waitTimeout = setTimeout(() => setIsDeleting(true), typingDelay);
          return () => clearTimeout(waitTimeout);
        } else if (isDeleting && text === '') {

    };

    const App = () => {
      const [currentHash, setCurrentHash] = useState(window.location.hash || '#home');

      useEffect(() => {
        const words = document.querySelectorAll('.premium-word');
        const activate = (el) => {
          words.forEach((w) => w.classList.toggle('is-active', w === el));
        };
        const reset = () => words.forEach((w) => w.classList.remove('is-active'));
        const handlers = [];

        words.forEach((word) => {
          const handleEnter = () => activate(word);
          handlers.push({ word, handleEnter });
          word.addEventListener('mouseenter', handleEnter);
          word.addEventListener('mouseleave', reset);
        });

        return () => {
          handlers.forEach(({ word, handleEnter }) => {
            word.removeEventListener('mouseenter', handleEnter);
          });
          words.forEach((word) => {
            word.removeEventListener('mouseleave', reset);
          });
        };
      }, []);

      useEffect(() => {
        const handleHashChange = () => {
          let hash = window.location.hash || '#home';
          if (hash === '#resume' || hash === '#experience') hash = '#education';
          setCurrentHash(hash);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      const renderRouter = () => {
        switch (currentHash) {
          case '#home': return <Hero key="hero" />;
          case '#about': return <About key="about" />;
          case '#skills': return <Skills key="skills" />;
          case '#projects': return <Projects key="projects" />;
          case '#training': return <Training key="training" />;
          case '#education': return <Education key="education" />;
          case '#certificates': return <Certificates key="certs" />;
          case '#contact': return <Contact key="contact" />;
          default: return <Hero key="default" />;
        }
      };

      return (
        <>
          <Navbar currentHash={currentHash} />
          <main className="pt-20 pb-12 w-full">
            <AnimatePresence mode="wait">
              {renderRouter()}
            </AnimatePresence>
          </main>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
  /* ===== Exomium background: WebGL particle field =====
     Self-contained IIFE. Touches ONLY #scene-canvas. Does not read from
     or write to any portfolio component, so it cannot affect layout,
     content, navigation, or existing functionality. */
  (function(){
    "use strict";
    const canvas = document.getElementById('scene-canvas');
    if (!canvas || typeof THREE === 'undefined') return;

    const isSmall = window.innerWidth < 768;
    const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 9);

    // ---- Ambient starfield ----
    const starCount = isSmall ? 400 : 900;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPos[i * 3]     = (Math.random() - 0.5) * 60;
      starPos[i * 3 + 1] = (Math.random() - 0.5) * 60;
      starPos[i * 3 + 2] = (Math.random() - 0.5) * 60 - 10;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({ color: 0x8890b8, size: 0.045, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // ---- Morphing particle core (color-matched to portfolio palette) ----
    const N = isSmall ? 1800 : 4200;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(N * 3);
    const colors = new Float32Array(N * 3);

    const cOrange = new THREE.Color(0xf97316);  // primary
    const cCyan   = new THREE.Color(0x06b6d4);  // secondary
    const cViolet = new THREE.Color(0x8b5cf6);  // accent

    for (let i = 0; i < N; i++) {
      const t = i / N;
      const c = t < 0.5
        ? cViolet.clone().lerp(cCyan, t / 0.5)
        : cCyan.clone().lerp(cOrange, (t - 0.5) / 0.5);
      colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
    }

    function shapeOrb(i, n, out) {
      const phi = Math.acos(-1 + (2 * i) / n);
      const theta = Math.sqrt(n * Math.PI) * phi;
      const r = 2.6 + Math.sin(i * 12.9898) * 0.06;
      out[0] = r * Math.cos(theta) * Math.sin(phi);
      out[1] = r * Math.sin(theta) * Math.sin(phi);
      out[2] = r * Math.cos(phi);
    }
    function shapeNetwork(i, n, out) {
      const u = (i / n) * Math.PI * 2 * 7;
      const v = (i / n) * Math.PI * 2;
      const R = 3.4, rr = 1.3;
      out[0] = (R + rr * Math.cos(v)) * Math.cos(u) * 0.6 + Math.sin(i * 3.1) * 1.4;
      out[1] = (R + rr * Math.cos(v)) * Math.sin(u) * 0.6 + Math.cos(i * 2.3) * 1.4;
      out[2] = rr * Math.sin(v) * 1.6 + Math.sin(i * 5.7) * 0.8;
    }
    function shapeGrid(i, n, out) {
      const side = Math.ceil(Math.sqrt(n));
      const x = (i % side) / side - 0.5;
      const y = Math.floor(i / side) / side - 0.5;
      out[0] = x * 9;
      out[1] = Math.sin(x * 6 + y * 4) * 0.5;
      out[2] = y * 9;
    }
    function shapeTunnel(i, n, out) {
      const ring = i % 60;
      const depth = Math.floor(i / 60);
      const a = (ring / 60) * Math.PI * 2;
      const rad = 2.2 + Math.sin(depth * 0.4) * 0.3;
      out[0] = Math.cos(a) * rad;
      out[1] = Math.sin(a) * rad;
      out[2] = -depth * 0.35 + 6;
    }
    function shapeCore(i, n, out) {
      const phi = Math.acos(-1 + (2 * i) / n);
      const theta = Math.sqrt(n * Math.PI) * phi * 1.5;
      const r = 1.6 + Math.sin(i * 7.1) * 0.15;
      out[0] = r * Math.cos(theta) * Math.sin(phi);
      out[1] = r * Math.sin(theta) * Math.sin(phi);
      out[2] = r * Math.cos(phi);
    }

    const keyframes = [shapeOrb, shapeNetwork, shapeGrid, shapeTunnel, shapeCore];
    const kfPositions = keyframes.map(fn => {
      const arr = new Float32Array(N * 3);
      const tmp = [0, 0, 0];
      for (let i = 0; i < N; i++) { fn(i, N, tmp); arr[i * 3] = tmp[0]; arr[i * 3 + 1] = tmp[1]; arr[i * 3 + 2] = tmp[2]; }
      return arr;
    });

    for (let i = 0; i < N * 3; i++) positions[i] = kfPositions[0][i];

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.055, vertexColors: true, transparent: true, opacity: 0.9,
      blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
    });
    const core = new THREE.Points(geometry, material);
    scene.add(core);

    // ---- Scroll progress drives the morph ----
    let scrollProgress = 0;
    function updateScroll() {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      scrollProgress = h > 0 ? window.scrollY / h : 0;
    }
    window.addEventListener('scroll', updateScroll, { passive: true });
    updateScroll();

    // ---- Mouse parallax ----
    let mouseX = 0, mouseY = 0, targetRX = 0, targetRY = 0;
    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = (e.clientY / window.innerHeight) * 2 - 1;
    });

    const posAttr = geometry.attributes.position;
    const clock = new THREE.Clock();

    function frame() {
      const t = clock.getElapsedTime();
      const segments = keyframes.length - 1;
      const scaled = Math.min(scrollProgress, 0.999) * segments;
      const idx = Math.floor(scaled);
      const localT = scaled - idx;
      const easedT = localT * localT * (3 - 2 * localT);

      const A = kfPositions[idx];
      const B = kfPositions[Math.min(idx + 1, kfPositions.length - 1)];

      for (let i = 0; i < N; i++) {
        const ix = i * 3;
        const wob = reduceMotion ? 0 : Math.sin(t * 0.6 + i * 0.13) * 0.05;
        posAttr.array[ix]     = A[ix]     + (B[ix] - A[ix]) * easedT + wob;
        posAttr.array[ix + 1] = A[ix + 1] + (B[ix + 1] - A[ix + 1]) * easedT + (reduceMotion ? 0 : Math.cos(t * 0.5 + i * 0.11) * 0.05);
        posAttr.array[ix + 2] = A[ix + 2] + (B[ix + 2] - A[ix + 2]) * easedT;
      }
      posAttr.needsUpdate = true;

      if (!reduceMotion) {
        core.rotation.y = t * 0.06 + scrollProgress * 2.4;
        core.rotation.x = Math.sin(t * 0.15) * 0.08;
        stars.rotation.y = t * 0.01;
      }

      targetRX += (mouseY * 0.35 - targetRX) * 0.04;
      targetRY += (mouseX * 0.45 - targetRY) * 0.04;
      camera.position.x = targetRY * 1.4;
      camera.position.y = -targetRX * 1.2;
      camera.position.z = 9 - scrollProgress * 2.2;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }
    frame();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  })();
  </script>
