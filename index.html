    }
    #aurora-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    #aurora-layer::before {
      content: '';
      position: absolute;
      width: 200%; height: 200%;
      top: -50%; left: -50%;
      background: conic-gradient(
        from 180deg at 50% 40%,
        transparent 0deg,
        rgba(139,92,246,0.10) 40deg,
        rgba(6,182,212,0.12) 80deg,
        transparent 120deg,
        rgba(249,115,22,0.07) 200deg,
        rgba(139,92,246,0.10) 280deg,
        transparent 360deg
      );
      animation: auroraRotate 25s linear infinite;
      transform-origin: center center;
    }
    #aurora-layer::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 20% 30%, rgba(139,92,246,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 80% 70%, rgba(6,182,212,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 60% 35% at 60% 20%, rgba(249,115,22,0.12) 0%, transparent 50%);
      animation: auroraShift 15s ease-in-out infinite alternate;
    }
    @keyframes auroraRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes auroraShift {
      0%   { opacity: 0.5; transform: scale(1) translateY(0px); }
      50%  { opacity: 0.9; transform: scale(1.1) translateY(-20px); }
      100% { opacity: 0.5; transform: scale(1) translateY(0px); }
    }
    .nebula-orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px);
    }
    .orb-1 {
      width: 700px; height: 700px; top: -200px; left: -200px;
      background: radial-gradient(circle, rgba(139,92,246,0.20) 0%, rgba(109,40,217,0.08) 50%, transparent 70%);

    }
    .orb-4 {
      width: 500px; height: 300px; top: 60%; right: 10%;
      background: radial-gradient(ellipse, rgba(139,92,246,0.15) 0%, transparent 60%);
      animation: orbFloat1 22s ease-in-out infinite reverse;
    }
    @keyframes orbFloat1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(60px,-40px) scale(1.1); }
      66%     { transform: translate(-30px,50px) scale(0.95); }
    }
    @keyframes orbFloat2 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(-50px,30px) scale(1.05); }
      66%     { transform: translate(40px,-60px) scale(1.1); }
    }
    @keyframes orbFloat3 {
      0%,100% { transform: translate(0,0) scale(1); opacity: 0.6; }
      50%     { transform: translate(-40px,-30px) scale(1.2); opacity: 1; }
    }
    #grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;

    #vignette {

      const [text, setText] = useState('');
      const [wordIndex, setWordIndex] = useState(0);

      useEffect(() => {
        const word = words[wordIndex];
        let typingDelay = isDeleting ? 40 : 120;

        if (!isDeleting && text === word) {
          typingDelay = 2000;
          const waitTimeout = setTimeout(() => setIsDeleting(true), typingDelay);
          return () => clearTimeout(waitTimeout);
        } else if (isDeleting && text === '') {
          setIsDeleting(false);
          setWordIndex((prev) => (prev + 1) % words.length);
          typingDelay = 400;

          setText(prev => isDeleting ? prev.slice(0, -1) : word.slice(0, prev.length + 1));

  <script>
    const canvas = document.getElementById('particle-canvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      let particlesArray = [];

      class Particle {
        constructor(x, y, dx, dy, size) {
          this.x = x; this.y = y; this.dx = dx; this.dy = dy; this.size = size;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
          ctx.fillStyle = 'rgba(156, 163, 175, 0.4)';
          ctx.shadowBlur = 10;
          ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
          ctx.fill();
        }
        update() {
          if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
          if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
          this.x += this.dx; this.y += this.dy;
          this.draw();
        }
      }

      function init() {
        particlesArray = [];
        let numberOfParticles = (canvas.height * canvas.width) / 9000;
        for (let i = 0; i < numberOfParticles; i++) {
          let size = (Math.random() * 2) + 0.5;
          let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
          let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
          let dx = (Math.random() * 0.5) - 0.25;
          let dy = (Math.random() * 0.5) - 0.25;
          particlesArray.push(new Particle(x, y, dx, dy, size));
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
        }
      }

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
      });

      init();
      animate();
    }
  </script>
</body>

</html>
